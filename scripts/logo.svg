<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c6bff"/>
      <stop offset="1" stop-color="#5b46e0"/>
    </linearGradient>
  </defs>
  <rect x="6" y="6" width="116" height="116" rx="30" fill="url(#g)"/>
  <!-- ascending steps = "structured, step-by-step" -->
  <g fill="#ffffff">
    <rect x="30" y="78" width="20" height="20" rx="5"/>
    <rect x="54" y="62" width="20" height="36" rx="5"/>
    <rect x="78" y="42" width="20" height="56" rx="5"/>
  </g>
  <!-- node + connection = "learning graph" -->
  <circle cx="40" cy="44" r="8" fill="#ffffff" opacity="0.95"/>
  <path d="M44 50 L60 64" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
</svg>
